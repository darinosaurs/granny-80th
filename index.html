<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>최정희 할머니 팔순잔치에 초대합니다</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunghyunzz/eulyoo1945/eulyoo1945.css">
<style>
  :root{
    --paper:#FFFFFF;    /* 배경 */
    --card:#F9F9F9;     /* 버튼 안쪽 면 */
    --ink:#1A1A1A;      /* 메인 글자 */
    --ink-soft:#4F4F4F; /* 흐린 글자 (인사말·설명) */
    --line:#A474C7;     /* 테두리·선 (노란 금색) */
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  b{font-weight:600;}            /* 을유1945는 600(SemiBold)이 볼드 */
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Eulyoo1945",serif;
    min-height:100dvh;
    display:flex; justify-content:center;
    padding:26px 16px calc(34px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ width:100%; max-width:430px; position:relative; }

  /* hand-drawn double frame */
  .frame{
    position:absolute; inset:0; border-radius:30px;
    border:2.6px solid var(--line);
    filter:url(#paperRough);
    pointer-events:none;
  }
  .frame::after{
    content:""; position:absolute; inset:7px; border-radius:24px;
    border:1.6px solid var(--line); opacity:.62;
  }

  .card{ position:relative; padding:30px 26px; text-align:center; }

  .dog{
    width:74%; max-width:280px; height:auto; display:block; margin:6px auto 2px;
    border-radius:18px;
    animation:bob 5.2s ease-in-out infinite;
  }
  @keyframes bob{50%{transform:translateY(-7px) rotate(-1deg);}}

  .name{
    font-weight:600; font-size:28px; letter-spacing:.04em; margin:2px 0 0px;
  }
  .title{
    font-weight:600; font-size:58px; line-height:1; letter-spacing:.04em; margin:0 0 2px;
  }

  .msg{
    font-size:18px; line-height:1.85; color:var(--ink-soft);
    margin:16px auto 6px; max-width:320px;
  }
  .msg span{ display:block; }

  .divider{ width:130px; height:24px; margin:16px auto 18px; opacity:.8; }

  .info{
    text-align:left; max-width:300px; margin:0 auto;
    display:flex; flex-direction:column; gap:15px;
  }
  .row{ display:flex; align-items:baseline; gap:12px; }
  .label{
    font-weight:600; font-size:19px; color:var(--ink); flex:0 0 52px;
  }
  .label::after{ content:":"; margin-left:3px; opacity:.6; }
  .val{ font-size:16px; line-height:1.7; color:var(--ink); flex:1; }
  .val .sub{ display:block; font-size:13.5px; color:var(--ink-soft); margin-top:3px; }

  .park{
    font-size:15px; color:var(--ink-soft);
    margin:18px auto 0; display:inline-flex; align-items:center; gap:7px;
  }

  .maps{ display:flex; gap:11px; margin:22px auto 4px; max-width:300px; }
  .btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:13px 8px; border-radius:16px; text-decoration:none;
    font-weight:600; font-size:16px;
    border:2.4px solid var(--line); color:var(--ink); background:var(--card);
    transition:transform .12s ease, background .15s ease;
    filter:url(#paperRough);
  }
  .btn:active{ transform:translateY(2px) scale(.985); background:#f6efd6; }
  .btn .pin{ width:16px; height:16px; flex:0 0 auto; }
  .btn:focus-visible{ outline:3px solid #9a7b53; outline-offset:3px; }

  /* entrance */
  .card>*{ animation:rise .7s cubic-bezier(.2,.7,.2,1) backwards; }
  .card>*:nth-child(1){animation-delay:.05s} .card>*:nth-child(2){animation-delay:.13s}
  .card>*:nth-child(3){animation-delay:.21s} .card>*:nth-child(4){animation-delay:.29s}
  .card>*:nth-child(5){animation-delay:.37s} .card>*:nth-child(6){animation-delay:.45s}
  .card>*:nth-child(7){animation-delay:.53s} .card>*:nth-child(8){animation-delay:.61s}
  @keyframes rise{from{opacity:0; transform:translateY(12px);}}

  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} }
  @media (max-width:360px){ .title{font-size:50px;} .dog{width:80%;} }
</style>
</head>
<body>
  <!-- 손그림 테두리 효과용 필터 (화면엔 안 보임) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="paperRough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="wrap">
    <div class="frame"></div>
    <main class="card">

      <img class="dog" src="dog.jpg" alt="할머니 팔순 축하 그림">

      <p class="name">최정희 할머니</p>
      <h1 class="title">팔순잔치</h1>

      <svg class="divider" viewBox="0 0 130 24" aria-hidden="true">
        <path d="M5 12 q10 -9 20 0 t20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#A474C7" stroke-width="2.4" stroke-linecap="round" opacity=".75"/>
      </svg>

      <div class="info">
        <div class="row"><span class="label">날짜</span><span class="val">2026년 7월 2일 목요일</span></div>
        <div class="row"><span class="label">시간</span><span class="val">오후 5:30 – 6:00 사이 도착</span></div>
        <div class="row"><span class="label">장소</span><span class="val">식구<span class="sub">경기 성남시 분당구 쇳골로 50</span></span></div>
      </div>

      <p class="park">
        <svg width="17" height="17" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        건물 앞 주차장이 마련되어 있어요.
      </p>

      <div class="maps">
        <a class="btn" href="https://map.naver.com/p/search/%EA%B2%BD%EA%B8%B0%20%EC%84%B1%EB%82%A8%EC%8B%9C%20%EB%B6%84%EB%8B%B9%EA%B5%AC%20%EC%87%B3%EA%B3%A8%EB%A1%9C%2050" target="_blank" rel="noopener">
          <svg class="pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.4" fill="currentColor"/></svg>
          네이버지도
        </a>
        <a class="btn" href="https://map.kakao.com/?q=%EA%B2%BD%EA%B8%B0%20%EC%84%B1%EB%82%A8%EC%8B%9C%20%EB%B6%84%EB%8B%B9%EA%B5%AC%20%EC%87%B3%EA%B3%A8%EB%A1%9C%2050" target="_blank" rel="noopener">
          <svg class="pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.4" fill="currentColor"/></svg>
          카카오맵
        </a>
      </div>

    </main>
  </div>
</body>
</html>
