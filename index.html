<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>최정희 할머니 팔순잔치에 초대합니다</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f0e9dc; --paper2:#e8dfcd; --card:#f7f1e5;
    --ink:#2b2622; --ink-soft:#5b5247; --line:#3a342d;
    --blush:#d99f86;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(120% 80% at 50% -10%, #f6f0e4 0%, var(--paper) 55%, var(--paper2) 100%);
    color:var(--ink);
    font-family:"Gowun Dodum",system-ui,sans-serif;
    min-height:100dvh;
    display:flex; justify-content:center;
    padding:26px 16px calc(34px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ width:100%; max-width:430px; position:relative; }

  /* hand-drawn double frame */
  .frame{
    position:absolute; inset:0; border-radius:30px;
    border:2.6px solid var(--line);
    filter:url(#paperRough);
    pointer-events:none;
  }
  .frame::after{
    content:""; position:absolute; inset:7px; border-radius:24px;
    border:1.6px solid var(--line); opacity:.62;
  }

  .card{
    position:relative; padding:30px 26px 30px;
    text-align:center;
  }

  .eyebrow{
    font-family:"Gaegu",cursive; font-size:19px; letter-spacing:.06em;
    color:var(--ink-soft); margin:4px 0 2px;
  }
  .eyebrow .dot{display:inline-block; margin:0 9px; opacity:.55;}

  .dog{
    width:74%; max-width:280px; height:auto; display:block; margin:6px auto 2px;
    animation:bob 5.2s ease-in-out infinite;
  }
  @keyframes bob{50%{transform:translateY(-7px) rotate(-1deg);}}

  .name{
    font-family:"Gaegu",cursive; font-weight:700;
    font-size:30px; letter-spacing:.04em; margin:2px 0 -2px;
  }
  .title{
    font-family:"Gaegu",cursive; font-weight:700;
    font-size:62px; line-height:.95; margin:0 0 2px;
    position:relative; display:inline-block;
  }
  .title .underline{
    display:block; width:160px; height:13px; margin:2px auto 0;
  }

  .msg{
    font-family:"Nanum Pen Script",cursive;
    font-size:25px; line-height:1.5; color:var(--ink-soft);
    margin:14px auto 6px; max-width:320px;
  }
  .msg span{ display:block; }

  .divider{ width:130px; height:24px; margin:14px auto 18px; opacity:.8;}

  .info{
    text-align:left; max-width:300px; margin:0 auto;
    display:flex; flex-direction:column; gap:15px;
  }
  .row{ display:flex; align-items:baseline; gap:12px; }
  .label{
    font-family:"Gaegu",cursive; font-weight:700; font-size:21px;
    color:var(--ink); flex:0 0 52px; position:relative;
  }
  .label::after{content:":"; margin-left:3px; opacity:.6;}
  .val{ font-size:16px; line-height:1.5; color:var(--ink); flex:1;}
  .val .sub{ display:block; font-size:13.5px; color:var(--ink-soft); margin-top:3px;}
  .pending{ color:#b0795f; border-bottom:1.5px dashed #c9a486; padding-bottom:1px;}

  .park{
    font-family:"Gaegu",cursive; font-size:16px; color:var(--ink-soft);
    margin:18px auto 0; display:inline-flex; align-items:center; gap:7px;
  }

  .maps{ display:flex; gap:11px; margin:22px auto 4px; max-width:300px;}
  .btn{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:13px 8px; border-radius:16px; text-decoration:none;
    font-family:"Gaegu",cursive; font-weight:700; font-size:17px;
    border:2.4px solid var(--line); color:var(--ink); background:var(--card);
    transition:transform .12s ease, background .15s ease;
    filter:url(#paperRough);
  }
  .btn:active{ transform:translateY(2px) scale(.985); background:#efe6d4;}
  .btn .pin{ width:17px; height:17px; flex:0 0 auto;}
  .btn:focus-visible{ outline:3px solid #9a7b53; outline-offset:3px;}

  .foot{
    font-family:"Nanum Pen Script",cursive; font-size:22px;
    color:var(--ink-soft); margin-top:24px;
  }
  .paw{ display:block; width:30px; height:24px; margin:10px auto 0; opacity:.7;}

  /* entrance */
  .card>*{ animation:rise .7s cubic-bezier(.2,.7,.2,1) backwards;}
  .card>*:nth-child(1){animation-delay:.05s} .card>*:nth-child(2){animation-delay:.12s}
  .card>*:nth-child(3){animation-delay:.19s} .card>*:nth-child(4){animation-delay:.26s}
  .card>*:nth-child(5){animation-delay:.33s} .card>*:nth-child(6){animation-delay:.40s}
  .card>*:nth-child(7){animation-delay:.47s} .card>*:nth-child(8){animation-delay:.54s}
  .card>*:nth-child(9){animation-delay:.61s} .card>*:nth-child(10){animation-delay:.68s}
  @keyframes rise{from{opacity:0; transform:translateY(12px);}}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;}
  }
  @media (max-width:360px){ .title{font-size:54px;} .dog{width:80%;} }
</style>
</head>
<body>
  <!-- hidden defs: hand-drawn roughen filter for borders -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="paperRough" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="9" result="t"/>
      <feDisplacementMap in="SourceGraphic" in2="t" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <div class="wrap">
    <div class="frame"></div>
    <main class="card">
      <p class="eyebrow">여든 번째 생신<span class="dot">&#9679;</span>八旬</p>

      <img class="dog" src="dog.jpg" alt="할머니 팔순 축하 그림">

      <p class="name">최정희 할머니</p>
      <h1 class="title">팔순잔치
        <svg class="underline" viewBox="0 0 160 13" aria-hidden="true"><path d="M3 8 Q40 2 80 7 T157 6" fill="none" stroke="#2b2622" stroke-width="3.2" stroke-linecap="round"/></svg>
      </h1>

      <p class="msg"><span>한 해 한 해 곱게 피어</span><span>여든 번째 봄을 맞으셨습니다</span><span>귀한 걸음으로 함께해 주세요</span></p>

      <svg class="divider" viewBox="0 0 130 24" aria-hidden="true">
        <path d="M5 12 q10 -9 20 0 t20 0 t20 0 t20 0 t20 0 t20 0" fill="none" stroke="#2b2622" stroke-width="2.4" stroke-linecap="round" opacity=".75"/>
      </svg>

      <div class="info">
        <div class="row"><span class="label">날짜</span><span class="val">2026년 7월 2일 <b>목요일</b></span></div>
        <div class="row"><span class="label">시간</span><span class="val">
          <b>5:30 – 6:00</b> 도착 &amp; 사진<br>
          <b>6:00</b> 축하 이벤트<br>
          <b>6:20</b> 식사 시작
        </span></div>
        <div class="row"><span class="label">장소</span><span class="val">식구<span class="sub">경기 성남시 분당구 쇳골로 50</span></span></div>
      </div>

      <p class="park">
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="#2b2622" stroke-width="2"/><path d="M9 17V7h4a3 3 0 0 1 0 6H9" fill="none" stroke="#2b2622" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        건물 내 주차장이 마련되어 있어요
      </p>

      <div class="maps">
        <a class="btn" href="https://map.naver.com/p/search/%EA%B2%BD%EA%B8%B0%20%EC%84%B1%EB%82%A8%EC%8B%9C%20%EB%B6%84%EB%8B%B9%EA%B5%AC%20%EC%87%B3%EA%B3%A8%EB%A1%9C%2050" target="_blank" rel="noopener">
          <svg class="pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.4" fill="currentColor"/></svg>
          네이버지도
        </a>
        <a class="btn" href="https://map.kakao.com/?q=%EA%B2%BD%EA%B8%B0%20%EC%84%B1%EB%82%A8%EC%8B%9C%20%EB%B6%84%EB%8B%B9%EA%B5%AC%20%EC%87%B3%EA%B3%A8%EB%A1%9C%2050" target="_blank" rel="noopener">
          <svg class="pin" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7Z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="9" r="2.4" fill="currentColor"/></svg>
          카카오맵
        </a>
      </div>

      <p class="foot">오셔서 자리를 빛내 주세요</p>
      <svg class="paw" viewBox="0 0 40 32" aria-hidden="true">
        <ellipse cx="20" cy="22" rx="9" ry="7.5" fill="#2b2622"/>
        <ellipse cx="9" cy="13" rx="3.4" ry="4.6" fill="#2b2622"/>
        <ellipse cx="16" cy="8" rx="3.4" ry="4.8" fill="#2b2622"/>
        <ellipse cx="24" cy="8" rx="3.4" ry="4.8" fill="#2b2622"/>
        <ellipse cx="31" cy="13" rx="3.4" ry="4.6" fill="#2b2622"/>
      </svg>
    </main>
  </div>
</body>
</html>
